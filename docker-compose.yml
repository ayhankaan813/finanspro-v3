version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: finanspro_v3_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: finanspro_v3
      POSTGRES_PASSWORD: finanspro_v3_secure_password
      POSTGRES_DB: finanspro_v3
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8 --lc-collate=C --lc-ctype=C"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finanspro_v3 -d finanspro_v3"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
